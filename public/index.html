<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASB Official</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #8be9ff;
    --primary-glow: rgba(139, 233, 255, 0.4);
    --bg: #05070c;
    --card-bg: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.08);
    --text-main: #ffffff;
    --text-sub: #a0aec0;
  }
  * { box-sizing: border-box; scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); color: var(--text-main); font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(139, 233, 255, 0.2); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

  header { position: fixed; top: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: rgba(5, 7, 12, 0.6); backdrop-filter: blur(12px); z-index: 1000; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  nav { overflow-x: auto; }
  nav ul { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; white-space: nowrap; }
  nav li { cursor: pointer; font-size: 14px; color: var(--text-sub); transition: color 0.3s; position: relative; padding: 24px 0; display: flex; align-items: center; }
  nav li:hover, nav li.active { color: #fff; }
  nav li.active::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--primary); box-shadow: 0 0 10px var(--primary); }
  nav a { color: var(--primary); text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 5px; }
  nav a:hover { text-shadow: 0 0 10px var(--primary-glow); }

  .tab-content { display: none; padding-top: 70px; min-height: 100vh; animation: fadeIn 0.4s ease; }
  .tab-content.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .container { padding: 60px 10%; max-width: 1200px; margin: 0 auto; }
  .page-title { font-family: 'Playfair Display', serif; font-size: 40px; text-align: center; margin-bottom: 40px; letter-spacing: 2px; }

  .hero { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; text-align: center; overflow: hidden; }
  .hero-bg { position: absolute; inset: -5%; background: url("background.jpg") center/cover no-repeat; z-index: 1; animation: slowPan 30s ease-in-out infinite alternate; }
  .hero-bg::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(5,7,12,0.1), var(--bg)); }
  @keyframes slowPan { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

  .particles { position: absolute; inset: 0; z-index: 2; pointer-events: none; background-image: radial-gradient(circle, rgba(139,233,255,0.4) 1px, transparent 1px), radial-gradient(circle, rgba(255,255,255,0.2) 2px, transparent 2px); background-size: 150px 150px, 300px 300px; animation: particleDrift 60s linear infinite; }
  @keyframes particleDrift { 0% { background-position: 0 0, 0 0; } 100% { background-position: 150px -300px, 300px -600px; } }

  .hero-inner { position: relative; z-index: 3; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: 100px; margin: 0; line-height: 1; background: linear-gradient(135deg, #fff 0%, #a0d8ef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 30px rgba(139, 233, 255, 0.3);}
  .hero p { font-size: 20px; letter-spacing: 4px; margin-top: 20px; color: #cbd5e0; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
  
  .btn-explore { margin-top: 40px; padding: 12px 30px; border: 1px solid var(--primary); background: rgba(139, 233, 255, 0.1); color: var(--primary); font-size: 14px; cursor: pointer; transition: 0.3s; border-radius: 30px; text-decoration: none; display: inline-block; backdrop-filter: blur(5px);}
  .btn-explore:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow); }

  .info-section { padding: 80px 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; position: relative; z-index: 3;}
  .panel { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: 16px; backdrop-filter: blur(10px); }
  .panel h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-top: 0; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
  
  #news-box { max-height: 250px; overflow-y: auto; padding-right: 10px; }
  .news-item { border-bottom: 1px solid var(--border); padding: 15px 0; font-size: 14px; color: var(--text-sub); animation: fadeDown 0.5s ease; }
  .news-item span { color: var(--primary); font-weight: bold; margin-right: 10px; font-family: monospace; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 30px; transition: 0.3s; display: flex; flex-direction: column; backdrop-filter: blur(10px);}
  .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .card h3 { margin: 0 0 5px 0; font-size: 22px; }
  .version { font-size: 13px; color: var(--primary); font-family: monospace; }
  
  .badge { display: inline-block; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: bold; margin-top: 10px; }
  .b-beta { border: 1px solid #f1c40f; color: #f1c40f; background: rgba(241, 196, 15, 0.1); }
  .b-update { border: 1px solid #e74c3c; color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
  .b-maint { border: 1px solid #95a5a6; color: #95a5a6; background: rgba(149, 165, 166, 0.1); }

  .desc { margin: 20px 0; font-size: 14px; color: var(--text-sub); line-height: 1.6; flex-grow: 1; white-space: pre-wrap; }
  
  .card-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; flex-wrap: wrap; gap: 15px; }
  .dl-count { font-size: 12px; color: #666; }
  
  .btn-wrapper { display: flex; gap: 10px; }
  .dl-btn { padding: 8px 16px; background: linear-gradient(135deg, #8be9ff, #3b82f6); color: #000; font-weight: bold; font-size:12px; border: none; border-radius: 20px; cursor: pointer; transition: 0.3s; }
  .dl-btn:hover { box-shadow: 0 0 15px var(--primary-glow); transform: scale(1.05); }
  .dl-btn.apk { background: linear-gradient(135deg, #a8ff78, #78ffd6); }
  .dl-btn.apk:hover { box-shadow: 0 0 15px rgba(120, 255, 214, 0.4); }
  .dl-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none;}

  .doc-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 40px; margin-bottom: 40px; line-height: 1.8; }
  .doc-section h3 { color: var(--primary); font-size: 20px; margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px;}
  .doc-section h4 { color: #fff; margin-top: 25px; margin-bottom: 10px; font-size: 16px;}
  .doc-section p, .doc-section li { color: var(--text-sub); font-size: 14px; margin-bottom: 15px; }

  footer { text-align: center; padding: 50px; color: #444; font-size: 12px; border-top: 1px solid var(--border); margin-top: 50px;}

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    .hero h1 { font-size: 50px; }
    .info-section { grid-template-columns: 1fr; padding: 40px 5%; }
    .doc-section { padding: 20px; }
  }
</style>
</head>
<body>

<header
